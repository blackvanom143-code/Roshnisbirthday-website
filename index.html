```html id="finalcode91"
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mio's Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ffd1dc,#ffc0cb,#ffb6c1);
height:100vh;
color:white;
text-align:center;
position:relative;
}

/* MAIN PAGE */

.page{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:absolute;
top:0;
left:0;
}

h1{
font-size:65px;
text-shadow:0 0 20px rgba(255,255,255,0.8);
z-index:2;
padding:0 20px;
}

p{
font-size:22px;
margin-top:15px;
z-index:2;
}

/* TIMER */

.timer{
display:flex;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
justify-content:center;
z-index:2;
}

.box{
background:rgba(255,255,255,0.18);
padding:25px;
border-radius:25px;
backdrop-filter:blur(10px);
width:140px;
box-shadow:0 0 25px rgba(255,0,76,0.3);
}

.box h2{
font-size:50px;
}

/* BUTTON */

.unlock-btn{
margin-top:50px;
padding:18px 45px;
border:none;
border-radius:40px;
font-size:22px;
background:white;
color:#ff4d6d;
font-weight:bold;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 25px pink;
}

.unlock-btn:hover{
transform:scale(1.08);
}

/* FLOATING HEARTS */

.heart{
position:absolute;
bottom:-50px;
animation:float 8s linear infinite;
pointer-events:none;
}

@keyframes float{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* SECOND PAGE */

#galleryPage{
display:none;
background:black;
overflow:hidden;
}

.gallery-title{
margin-top:40px;
font-size:55px;
z-index:10;
text-shadow:0 0 20px rgba(255,255,255,0.8);
}

/* PHOTO BALLOONS */

.balloon{
position:absolute;
bottom:-450px;
width:220px;
animation:rise linear infinite;
}

.balloon img{
width:100%;
height:320px;
object-fit:cover;
border-radius:30px;
border:6px solid white;
box-shadow:0 0 30px rgba(255,255,255,0.6);
}

.balloon::before{
content:"❤️";
position:absolute;
top:-65px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

@keyframes rise{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-170vh);
}

}

/* MOBILE */

@media(max-width:768px){

h1{
font-size:42px;
}

p{
font-size:18px;
}

.box{
width:110px;
padding:18px;
}

.box h2{
font-size:38px;
}

.gallery-title{
font-size:38px;
}

.balloon{
width:150px;
}

.balloon img{
height:230px;
}

}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="page" id="countdownPage">

<h1>Mio's Its Your Birthday ❤️</h1>

<p>Waiting for the most special day ✨</p>

<div class="timer">

<div class="box">
<h2 id="days">0</h2>
<span>Days</span>
</div>

<div class="box">
<h2 id="hours">0</h2>
<span>Hours</span>
</div>

<div class="box">
<h2 id="minutes">0</h2>
<span>Minutes</span>
</div>

<div class="box">
<h2 id="seconds">0</h2>
<span>Seconds</span>
</div>

</div>

<button class="unlock-btn" id="unlockBtn">
❤️ Open Surprise ❤️
</button>

</div>

<!-- PAGE 2 -->

<div class="page" id="galleryPage">

<h1 class="gallery-title">
Our Cute Memories ❤️
</h1>

<!-- PHOTO 1 -->

<div class="balloon" style="left:2%;animation-duration:18s;">
<img src="photo1.jpg">
</div>

<!-- PHOTO 2 -->

<div class="balloon" style="left:26%;animation-duration:22s;">
<img src="photo2.jpg">
</div>

<!-- PHOTO 3 -->

<div class="balloon" style="left:52%;animation-duration:20s;">
<img src="photo3.jpg">
</div>

<!-- PHOTO 4 -->

<div class="balloon" style="left:76%;animation-duration:24s;">
<img src="photo4.jpg">
</div>

</div>

<script>

/* TESTING MODE */

const targetDate = new Date("May 1, 2025 00:00:00").getTime();

/* COUNTDOWN */

setInterval(()=>{

const now = new Date().getTime();

const distance = targetDate - now;

const days = Math.floor(distance / (1000*60*60*24));

const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

const seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("days").innerHTML = days;

document.getElementById("hours").innerHTML = hours;

document.getElementById("minutes").innerHTML = minutes;

document.getElementById("seconds").innerHTML = seconds;

},1000);

/* BUTTON CLICK */

document.getElementById("unlockBtn").addEventListener("click",()=>{

document.getElementById("countdownPage").style.display="none";

document.getElementById("galleryPage").style.display="flex";

});

/* FLOATING HEARTS */

function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerText = "❤️";

heart.style.left = Math.random()*100+"vw";

heart.style.fontSize = Math.random()*30+15+"px";

heart.style.animationDuration = Math.random()*5+5+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,200);

</script>

</body>
</html>
```
