<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Countdown ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffd6e7,#ffc0cb,#ffb6c1);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
color:white;
text-align:center;
}

h1{
font-size:70px;
text-shadow:0 0 20px rgba(255,255,255,0.8);
z-index:2;
}

p{
font-size:24px;
margin-top:15px;
z-index:2;
}

.timer{
display:flex;
gap:20px;
margin-top:40px;
z-index:2;
flex-wrap:wrap;
justify-content:center;
}

.box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
width:140px;
box-shadow:0 0 25px rgba(255,0,76,0.3);
}

.box h2{
font-size:50px;
}

.box span{
font-size:18px;
}

.heart{
position:absolute;
bottom:-50px;
color:red;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(0) scale(1);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Her Birthday Countdown ❤️</h1>

<p>Waiting for the most special day ✨</p>

<div class="timer">

<div class="box">
<h2 id="days">0</h2>
<span>Days</span>
</div>

<div class="box">
<h2 id="hours">0</h2>
<span>Hours</span>
</div>

<div class="box">
<h2 id="minutes">0</h2>
<span>Minutes</span>
</div>

<div class="box">
<h2 id="seconds">0</h2>
<span>Seconds</span>
</div>

</div>

<script>

const targetDate = new Date("June 26, 2026 00:00:00").getTime();

setInterval(() => {

const now = new Date().getTime();

const distance = targetDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);

function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤️";

heart.style.left = Math.random() * 100 + "vw";

heart.style.fontSize = Math.random() * 30 + 20 + "px";

heart.style.animationDuration = Math.random() * 5 + 5 + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,200);

</script>

</body>
</html>
