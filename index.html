<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mio's Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
background:#ffc0cb;
}

/* PAGE */

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

/* HEARTS */

.heart{
position:absolute;
font-size:30px;
animation:float 10s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
100%{
transform:translateY(-120vh) scale(1.2);
opacity:1;
}
}

/* FIRST PAGE */

#countdownPage{
background:#ffc0cb;
color:white;
text-align:center;
}

.main-title{
font-size:70px;
font-weight:700;
text-shadow:0 0 20px rgba(255,255,255,0.7);
margin-bottom:20px;
z-index:5;
}

.subtitle{
font-size:24px;
margin-bottom:40px;
z-index:5;
}

.countdown{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
z-index:5;
}

.box{
width:150px;
height:150px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
border-radius:30px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 0 30px rgba(255,255,255,0.4);
}

.box h1{
font-size:55px;
}

.box p{
font-size:20px;
margin-top:10px;
}

#openBtn{
margin-top:50px;
padding:20px 50px;
border:none;
border-radius:50px;
font-size:24px;
font-weight:600;
background:white;
color:#ff4f81;
cursor:pointer;
box-shadow:0 0 30px rgba(255,255,255,0.6);
transition:0.4s;
z-index:5;
}

#openBtn:hover{
transform:scale(1.08);
}

/* PAGE 2 */

#galleryPage{
display:none;
background:black;
overflow:hidden;
}

.gallery-title{
position:absolute;
top:45px;
font-size:65px;
font-weight:700;
color:white;
text-shadow:0 0 25px white;
z-index:5;
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-500px;
width:240px;
height:240px;
animation:fly linear infinite;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.balloon img{
width:100%;
height:100%;
object-fit:contain;
background:black;
border-radius:35px;
border:6px solid white;
box-shadow:0 0 35px white;
padding:0;
}

/* BALLOON TOP */

.balloon::before{
content:"🎈";
position:absolute;
top:-70px;
left:50%;
transform:translateX(-50%);
font-size:70px;
}

/* STRING */

.balloon::after{
content:"";
position:absolute;
width:2px;
height:140px;
background:white;
left:50%;
bottom:-140px;
}

/* FLOAT */

@keyframes fly{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-180vh);
}
}

/* POSITIONS */

.b1{
left:2%;
animation-duration:18s;
}

.b2{
left:27%;
animation-duration:22s;
}

.b3{
left:52%;
animation-duration:20s;
}

.b4{
left:76%;
animation-duration:24s;
}

</style>
</head>

<body>

<!-- HEARTS -->

<div id="hearts"></div>

<!-- PAGE 1 -->

<div class="page" id="countdownPage">

<h1 class="main-title">
Mio's Its Your Birthday ❤️
</h1>

<p class="subtitle">
Waiting for the most special day ✨
</p>

<div class="countdown">

<div class="box">
<h1>54</h1>
<p>Days</p>
</div>

<div class="box">
<h1>12</h1>
<p>Hours</p>
</div>

<div class="box">
<h1>45</h1>
<p>Minutes</p>
</div>

<div class="box">
<h1>22</h1>
<p>Seconds</p>
</div>

</div>

<button id="openBtn">
🎁 Open Surprise 🎁
</button>

</div>

<!-- PAGE 2 -->

<div class="page" id="galleryPage">

<h1 class="gallery-title">
Our Cute Memories ❤️
</h1>

<!-- PHOTO 1 -->

<div class="balloon b1">
<img src="./photo1.jpg.jpg">
</div>

<!-- PHOTO 2 -->

<div class="balloon b2">
<img src="./photo2.jpg.jpg">
</div>

<!-- PHOTO 3 -->

<div class="balloon b3">
<img src="./photo3.jpg.jpg">
</div>

<!-- PHOTO 4 -->

<div class="balloon b4">
<img src="./photo4.jpg.jpg">
</div>

</div>

<script>

/* HEARTS */

for(let i=0;i<80;i++){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*10)+"s";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.getElementById("hearts").appendChild(heart);

}

/* OPEN PAGE */

document.getElementById("openBtn").onclick=()=>{

document.getElementById("countdownPage").style.display="none";

document.getElementById("galleryPage").style.display="flex";

};

</script>

</body>
</html>
