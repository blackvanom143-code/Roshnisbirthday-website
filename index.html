<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mio's Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
background:#ffc0cb;
}

/* PAGES */

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

/* HEARTS */

.heart{
position:absolute;
font-size:30px;
animation:floatHeart linear infinite;
opacity:0.8;
pointer-events:none;
z-index:1;
}

@keyframes floatHeart{
0%{
transform:translateY(120vh) scale(0.5);
opacity:0;
}
100%{
transform:translateY(-140vh) scale(1.2);
opacity:1;
}
}

/* PAGE 1 */

#countdownPage{
background:#ffc0cb;
color:white;
text-align:center;
}

.main-title{
font-size:68px;
font-weight:700;
text-shadow:0 0 20px rgba(255,255,255,0.8);
margin-bottom:20px;
z-index:5;
}

.subtitle{
font-size:24px;
margin-bottom:40px;
z-index:5;
}

.countdown{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
z-index:5;
}

.box{
width:150px;
height:150px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
border-radius:30px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 0 35px rgba(255,255,255,0.5);
}

.box h1{
font-size:55px;
}

.box p{
font-size:20px;
margin-top:10px;
}

#openBtn{
margin-top:50px;
padding:20px 55px;
border:none;
border-radius:60px;
font-size:24px;
font-weight:600;
background:white;
color:#ff4f81;
cursor:pointer;
box-shadow:0 0 35px rgba(255,255,255,0.7);
transition:0.4s;
z-index:5;
}

#openBtn:hover{
transform:scale(1.08);
}

/* PAGE 2 */

#galleryPage{
display:none;
background:black;
overflow:hidden;
}

/* TITLE */

.gallery-title{
position:absolute;
top:45px;
left:50%;
transform:translateX(-50%);
font-size:70px;
font-weight:700;
color:#ff69b4;
text-shadow:0 0 30px #ff69b4;
z-index:15;
text-align:center;
width:100%;
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-450px;
width:240px;
height:240px;
animation:flyUp linear infinite;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.balloon img{
width:100%;
height:100%;
object-fit:contain;
background:black;
border-radius:35px;
border:6px solid white;
box-shadow:0 0 35px white;
}

.balloon::before{
content:"🎈";
position:absolute;
top:-70px;
left:50%;
transform:translateX(-50%);
font-size:70px;
}

/* FASTER FLOAT */

@keyframes flyUp{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-190vh);
}
}

/* POSITIONS */

.b1{
left:2%;
animation-duration:11s;
}

.b2{
left:27%;
animation-duration:13s;
}

.b3{
left:52%;
animation-duration:12s;
}

.b4{
left:77%;
animation-duration:14s;
}

/* BUTTON */

#memoryBtn{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:-200px;
padding:22px 42px;
border:none;
border-radius:60px;
background:#ff69b4;
color:white;
font-size:24px;
font-weight:600;
cursor:pointer;
box-shadow:0 0 30px #ff69b4;
opacity:0;
z-index:20;
transition:0.4s;
}

#memoryBtn.show{
animation:buttonRise 2s forwards;
}

@keyframes buttonRise{
0%{
bottom:-200px;
opacity:0;
}
100%{
bottom:180px;
opacity:1;
}
}

#memoryBtn:hover{
transform:translateX(-50%) scale(1.08);
}

/* PAGE 3 */

#testPage{
display:none;
background:#ffc0cb;
justify-content:center;
align-items:center;
}

.blankText{
font-size:70px;
font-weight:700;
color:white;
text-shadow:0 0 30px white;
}

/* MOBILE */

@media(max-width:768px){

.main-title{
font-size:42px;
padding:0 20px;
}

.gallery-title{
font-size:48px;
padding:0 20px;
}

.box{
width:120px;
height:120px;
}

.box h1{
font-size:40px;
}

.balloon{
width:170px;
height:170px;
}

#memoryBtn{
font-size:18px;
padding:18px 25px;
width:85%;
}

.blankText{
font-size:42px;
text-align:center;
padding:20px;
}

}

</style>
</head>

<body>

<!-- HEARTS -->

<div id="heartsContainer"></div>

<!-- PAGE 1 -->

<div class="page" id="countdownPage">

<h1 class="main-title">
Mio's Its Your Birthday ❤️
</h1>

<p class="subtitle">
Waiting for the most special day ✨
</p>

<div class="countdown">

<div class="box">
<h1 id="days">00</h1>
<p>Days</p>
</div>

<div class="box">
<h1 id="hours">00</h1>
<p>Hours</p>
</div>

<div class="box">
<h1 id="minutes">00</h1>
<p>Minutes</p>
</div>

<div class="box">
<h1 id="seconds">00</h1>
<p>Seconds</p>
</div>

</div>

<button id="openBtn">
🎁 Open Surprise 🎁
</button>

</div>

<!-- PAGE 2 -->

<div class="page" id="galleryPage">

<h1 class="gallery-title">
Our Cute Memories 💖
</h1>

<!-- PHOTO 1 -->

<div class="balloon b1">
<img src="./photo1.jpg.jpg">
</div>

<!-- PHOTO 2 -->

<div class="balloon b2">
<img src="./photo2.jpg.jpg">
</div>

<!-- PHOTO 3 -->

<div class="balloon b3">
<img src="./photo3.jpg.jpg">
</div>

<!-- PHOTO 4 -->

<div class="balloon b4">
<img src="./photo4.jpg.jpg">
</div>

<!-- BUTTON -->

<button id="memoryBtn">
💖 Test Your Muscle Memory Of Love And Bond 💖
</button>

</div>

<!-- PAGE 3 -->

<div class="page" id="testPage">

<div class="blankText">
Pink Test Page 💕
</div>

</div>

<script>

/* HEARTS */

function createHearts(){

for(let i=0;i<90;i++){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.top=Math.random()*100+"vh";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

heart.style.fontSize=(18+Math.random()*25)+"px";

document.getElementById("heartsContainer").appendChild(heart);

}

}

createHearts();

/* COUNTDOWN */

const targetDate = new Date("June 26, 2026 00:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const distance = targetDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));

const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);

/* OPEN PAGE 2 */

document.getElementById("openBtn").onclick=()=>{

document.getElementById("countdownPage").style.display="none";

document.getElementById("galleryPage").style.display="flex";

/* BUTTON AFTER PHOTOS GO UP */

setTimeout(()=>{

document.getElementById("memoryBtn").classList.add("show");

},4500);

};

/* OPEN PAGE 3 */

document.getElementById("memoryBtn").onclick=()=>{

document.getElementById("galleryPage").style.display="none";

document.getElementById("testPage").style.display="flex";

};

</script>

</body>
</html>
