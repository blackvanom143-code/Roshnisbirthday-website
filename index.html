<div class="page hidden" id="quizPage">

    <div class="quiz-container">

        <h1 class="quiz-title">
            Test Your Muscle Memory Of Love & Bond 💖
        </h1>

        <div class="kiss-counter">

                <button class="answer-btn" onclick="checkAnswer(this)">
                    Option 2
                </button>

                <button class="answer-btn" onclick="checkAnswer(this)">
                    Option 3
                </button>

                <button class="answer-btn" onclick="checkAnswer(this)">
                    Option 4

            </div>

        </div>

</div>

<!-- ========================================= -->
<!-- CSS START 💖 -->
<!-- ========================================= -->

<style>

#quizPage{
    min-height:100vh;
    background:#ffc7d8;
    overflow:hidden;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.quiz-container{
    width:100%;
    max-width:700px;
    text-align:center;
}

.quiz-title{
    font-size:55px;
    color:white;
    text-shadow:0 0 20px hotpink;
    margin-bottom:25px;
}

.kiss-counter{
    font-size:28px;
    color:#ff2e74;
    font-weight:bold;
    margin-bottom:30px;
}

.question-card{
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:30px;
    box-shadow:0 0 30px rgba(255,255,255,0.5);
}

.question-card h2{
    color:white;
    font-size:34px;
    margin-bottom:30px;
}

.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.answer-btn{
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    background:white;
    color:#ff2e74;
    transition:0.3s;
}

.answer-btn:hover{
    transform:scale(1.05);
    background:#ff2e74;
    color:white;
}

#couponPopup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    z-index:99999;
    text-align:center;
    transition:0.5s;
}

#couponPopup.show{
    transform:translate(-50%,-50%) scale(1);
}

.coupon-card{
    width:380px;
    height:170px;
    background:#ffd6e2;
    border:6px solid #444;
    border-radius:20px;
    display:flex;
    overflow:hidden;
    box-shadow:0 0 40px hotpink;
}

.coupon-left{
    flex:3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    color:#222;
    font-weight:bold;
}

.coupon-right{
    flex:1;
    border-left:5px dashed #444;
    display:flex;
    justify-content:center;
    align-items:center;
    writing-mode:vertical-rl;
    font-size:30px;
    font-weight:bold;
}

.coupon-text{
    margin-top:20px;
    color:white;
    font-size:28px;
    text-shadow:0 0 15px hotpink;
}

#finalLovePage{
    min-height:100vh;
    background:#ffbfd1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.final-box{
    text-align:center;
}

.final-box h1{
    font-size:70px;
    color:white;
    text-shadow:0 0 20px hotpink;
}

.final-box p{
    font-size:35px;
    color:#ff2e74;
    margin-top:20px;
}

/* FLOATING HEARTS */

.quiz-heart{
    position:absolute;
    bottom:-100px;
    color:pink;
    animation:quizFloat linear infinite;
    opacity:0.7;
}

@keyframes quizFloat{

    0%{
        transform:translateY(0) scale(1);
    }

    100%{
        transform:translateY(-120vh) scale(1.5);
    }

}

</style>

<!-- ========================================= -->
<!-- SCRIPT START 💖 -->
<!-- ========================================= -->

<script>

const questions = [

{
question:"What is our password? 💖",

answers:[
"YUDKBH + Hot Chocolate",
"Chocolate + Love",
"Modak123",
"Forever Us"
],

correct:"YUDKBH + Hot Chocolate"
},

{
question:"The night it all began? ✨",

answers:[
"25/12/2024",
"01/01/2025",
"14/02/2025",
"10/12/2024"
],

correct:"25/12/2024"
},

{
question:"Where was our first kiss? 😭💋",

answers:[
"ISKON",
"Chulna Talav",
"College",
"Cafe"
],

correct:"Chulna Talav"
},

{
question:"Where was Modak's first birthday place? 🎂",

answers:[
"ISKON",
"Temple",
"Cafe",
"Resort"
],

correct:"ISKON"
},

{
question:"What was the first gift given by Modak? 🎁",

answers:[
"Ring",
"Chocolate",
"Anklet",
"Teddy"
],

correct:"Anklet"
}

];

let currentQuestion = 0;
let score = 0;

const questionText = document.getElementById("questionText");
const buttons = document.querySelectorAll(".answer-btn");

function loadQuestion(){

    let q = questions[currentQuestion];

    questionText.innerHTML = q.question;

    buttons.forEach((btn,index)=>{

        btn.innerHTML = q.answers[index];

    });

}

loadQuestion();

function checkAnswer(button){

    let selected = button.innerHTML;

    let correct = questions[currentQuestion].correct;

    if(selected === correct){

        score++;

        document.getElementById("kissCount").innerHTML = score;

        showCoupon();

        createHeartBurst();

    }else{

        alert("Areee wrong answer baby 😭💔");

    }

    currentQuestion++;

    if(currentQuestion < questions.length){

        setTimeout(()=>{

            loadQuestion();

        },800);

    }else{

        setTimeout(()=>{

            document.getElementById("quizPage").style.display="none";

            document.getElementById("finalLovePage").style.display="flex";

        },1200);

    }

}

function showCoupon(){

    let popup = document.getElementById("couponPopup");

    popup.classList.add("show");

    setTimeout(()=>{

        popup.classList.remove("show");

    },1800);

}

function createHeartBurst(){

    for(let i=0;i<20;i++){

        let heart = document.createElement("div");

        heart.innerHTML="💖";

        heart.classList.add("quiz-heart");

        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=(20+Math.random()*40)+"px";

        heart.style.animationDuration=(3+Math.random()*4)+"s";

        document.getElementById("quizPage").appendChild(heart);

        setTimeout(()=>{

            heart.remove();

        },7000);

    }

}

</script>
